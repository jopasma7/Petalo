<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pétalo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../styles/main.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
    <script src="../../node_modules/xlsx/dist/xlsx.full.min.js"></script>
    <script src="../../node_modules/jspdf/dist/jspdf.umd.min.js"></script>
</head>
<body>


<div class="app-container">

    <!-- FAB -->
    <div class="fab-container">
        <button class="fab main-fab" id="main-fab"><i data-lucide="plus"></i></button>
        <div class="fab-menu" id="fab-menu">
            <button class="fab fab-secondary" data-action="nuevo-producto" data-i18n-title="products.new"><i data-lucide="box"></i></button>
            <button class="fab fab-secondary" data-action="nuevo-cliente"  data-i18n-title="clients.new"><i data-lucide="user-plus"></i></button>
            <button class="fab fab-secondary" data-action="nuevo-evento"   data-i18n-title="events.new"><i data-lucide="calendar-plus"></i></button>
            <button class="fab fab-secondary" data-action="nuevo-pedido"   data-i18n-title="orders.new"><i data-lucide="clipboard-list"></i></button>
        </div>
    </div>

    <!-- Top Nav -->
    <nav class="top-nav">
        <div class="nav-left">
            <div class="logo-container">
                <div class="logo-icon">✿</div>
                <div class="logo-text">
                    <span class="brand-name">Pétalo</span>
                    <span class="brand-subtitle" data-i18n="common.brand_subtitle"></span>
                </div>
            </div>
        </div>

        <div class="nav-right">
            <div class="nav-actions">
                <button class="nav-action-btn" data-section="notificaciones" data-i18n-title="nav.notifications">
                    <i data-lucide="bell"></i>
                    <span class="badge" id="badge-notificaciones" style="display:none;"></span>
                </button>
                <button class="nav-action-btn" data-section="configuracion" data-i18n-title="nav.config">
                    <i data-lucide="settings"></i>
                </button>
                <div class="user-menu">
                    <div class="user-avatar-placeholder">A</div>
                    <span class="user-name">Admin</span>
                </div>
            </div>
        </div>
    </nav>

    <!-- Sidebar -->
    <aside class="modern-sidebar">
        <div class="sidebar-content">
            <div class="nav-sections">
                <div class="nav-section">
                    <h3 class="section-title" data-i18n="nav.principal"></h3>
                    <nav class="nav-links">
                        <a href="#" class="nav-link active" data-section="dashboard">
                            <span class="nav-icon"><i data-lucide="layout-dashboard"></i></span>
                            <span class="nav-text" data-i18n="nav.dashboard"></span>
                        </a>
                    </nav>
                </div>
                <div class="nav-section">
                    <h3 class="section-title" data-i18n="nav.gestion"></h3>
                    <nav class="nav-links">
                        <a href="#" class="nav-link" data-section="productos">
                            <span class="nav-icon"><i data-lucide="box"></i></span>
                            <span class="nav-text" data-i18n="nav.products"></span>
                            <span class="nav-badge" id="badge-productos"></span>
                        </a>
                        <a href="#" class="nav-link" data-section="clientes">
                            <span class="nav-icon"><i data-lucide="users"></i></span>
                            <span class="nav-text" data-i18n="nav.clients"></span>
                            <span class="nav-badge" id="badge-clientes"></span>
                        </a>
                        <a href="#" class="nav-link" data-section="eventos">
                            <span class="nav-icon"><i data-lucide="calendar"></i></span>
                            <span class="nav-text" data-i18n="nav.events"></span>
                            <span class="nav-badge" id="badge-eventos"></span>
                        </a>
                        <a href="#" class="nav-link" data-section="pedidos">
                            <span class="nav-icon"><i data-lucide="clipboard-list"></i></span>
                            <span class="nav-text" data-i18n="nav.orders"></span>
                            <span class="nav-badge" id="badge-pedidos"></span>
                        </a>
                    </nav>
                </div>
                <div class="nav-section">
                    <h3 class="section-title" data-i18n="nav.analisis"></h3>
                    <nav class="nav-links">
                        <a href="#" class="nav-link" data-section="inventario">
                            <span class="nav-icon"><i data-lucide="archive"></i></span>
                            <span class="nav-text" data-i18n="nav.inventory"></span>
                        </a>
                        <a href="#" class="nav-link" data-section="reportes">
                            <span class="nav-icon"><i data-lucide="bar-chart-2"></i></span>
                            <span class="nav-text" data-i18n="nav.reports"></span>
                        </a>
                    </nav>
                </div>
            </div>
            <div class="sidebar-tpv-wrap">
                <button class="sidebar-tpv-btn" onclick="app.ventaRapida()">
                    <i data-lucide="zap" style="width:18px;height:18px"></i>
                    <span data-i18n="nav.quick_sale"></span>
                </button>
            </div>
            <div class="sidebar-footer">
                <div class="quick-stats">
                    <div class="stat-item">
                        <span class="stat-label" data-i18n="sidebar.sales_today"></span>
                        <span class="stat-value" id="sidebar-ventas-hoy">—</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label" data-i18n="sidebar.low_stock"></span>
                        <span class="stat-value warning" id="sidebar-stock-bajo">—</span>
                    </div>
                    <div class="stat-item stat-item-link" id="sidebar-entregas-hoy-item" onclick="app._irEntregasHoy()">
                        <span class="stat-label" data-i18n="sidebar.deliveries_today"></span>
                        <span class="stat-value" id="sidebar-entregas-hoy">—</span>
                    </div>
                </div>
            </div>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="modern-main-content">
        <div class="content-wrapper">

            <!-- ═══════════════════════════════════════════════ DASHBOARD -->
            <section id="dashboard-section" class="content-section" style="display:block;">

                <!-- KPIs -->
                <div class="stats-grid">
                    <div class="stat-card warning dashboard-link" data-section="pedidos">
                        <div class="stat-icon"><i data-lucide="clock"></i></div>
                        <div class="stat-content">
                            <h3 data-i18n="dashboard.pending_orders"></h3>
                            <div class="stat-number" id="pedidos-pendientes">0</div>
                            <div class="stat-sub" id="dash-pedidos-hoy"></div>
                        </div>
                    </div>
                    <div class="stat-card primary dashboard-link" data-section="pedidos">
                        <div class="stat-icon"><i data-lucide="trending-up"></i></div>
                        <div class="stat-content">
                            <h3 data-i18n="dashboard.monthly_sales"></h3>
                            <div class="stat-number" id="ventas-mes">0,00 €</div>
                            <div class="stat-sub" id="dash-ventas-sub" data-i18n="dashboard.this_month"></div>
                        </div>
                    </div>
                    <div class="stat-card success dashboard-link" data-section="clientes">
                        <div class="stat-icon"><i data-lucide="users"></i></div>
                        <div class="stat-content">
                            <h3 data-i18n="dashboard.total_clients"></h3>
                            <div class="stat-number" id="total-clientes">0</div>
                            <div class="stat-sub" id="dash-clientes-sub" data-i18n="dashboard.registered"></div>
                        </div>
                    </div>
                    <div class="stat-card primary dashboard-link" data-section="inventario">
                        <div class="stat-icon"><i data-lucide="alert-triangle"></i></div>
                        <div class="stat-content">
                            <h3 data-i18n="dashboard.stock_alerts"></h3>
                            <div class="stat-number" id="total-productos">0</div>
                            <div class="stat-sub" data-i18n="dashboard.low_products"></div>
                        </div>
                    </div>
                </div>

                <!-- Contenido principal -->
                <div class="dashboard-content">
                    <div class="dashboard-main" style="display:flex;flex-direction:column;gap:var(--sp-5)">

                        <!-- Pedidos de hoy -->
                        <div class="card">
                            <div class="card-header" style="display:flex;justify-content:space-between;align-items:center">
                                <div>
                                    <h3 class="card-title" data-i18n="dashboard.orders_today"></h3>
                                    <p class="card-subtitle" data-i18n="dashboard.orders_today_sub"></p>
                                </div>
                                <button class="btn btn-sm btn-secondary" onclick="app.showSection('pedidos')" data-i18n="common.see_all"></button>
                            </div>
                            <div class="card-body" style="padding:0">
                                <div id="dash-pedidos-hoy-lista"></div>
                            </div>
                        </div>

                        <!-- Acciones rápidas -->
                        <div class="card">
                            <div class="card-header">
                                <h3 class="card-title" data-i18n="dashboard.quick_actions"></h3>
                                <p class="card-subtitle" data-i18n="dashboard.quick_actions_sub"></p>
                            </div>
                            <div class="card-body">
                                <div class="dash-quick-actions">
                                    <button class="dash-quick-btn dash-quick-btn--primary" onclick="app.ventaRapida()">
                                        <div class="dash-quick-icon" style="background:#dcfce7"><i data-lucide="zap" style="color:#16a34a"></i></div>
                                        <span data-i18n="dashboard.quick_sale"></span>
                                    </button>
                                    <button class="dash-quick-btn" onclick="app.nuevoPedido()">
                                        <div class="dash-quick-icon" style="background:#f3e8ff"><i data-lucide="clipboard-list" style="color:#7c3aed"></i></div>
                                        <span data-i18n="dashboard.new_order"></span>
                                    </button>
                                    <button class="dash-quick-btn" onclick="app.nuevoCliente()">
                                        <div class="dash-quick-icon" style="background:#dbeafe"><i data-lucide="user-plus" style="color:#1d4ed8"></i></div>
                                        <span data-i18n="dashboard.new_client"></span>
                                    </button>
                                    <button class="dash-quick-btn" onclick="app.showSection('inventario')">
                                        <div class="dash-quick-icon" style="background:#fef3c7"><i data-lucide="package" style="color:#d97706"></i></div>
                                        <span data-i18n="dashboard.see_inventory"></span>
                                    </button>
                                    <button class="dash-quick-btn" onclick="app.nuevoEvento()">
                                        <div class="dash-quick-icon" style="background:#fce7f3"><i data-lucide="calendar-plus" style="color:#be185d"></i></div>
                                        <span data-i18n="dashboard.new_event"></span>
                                    </button>
                                    <button class="dash-quick-btn" onclick="app.showSection('reportes')">
                                        <div class="dash-quick-icon" style="background:#f0fdf4"><i data-lucide="bar-chart-2" style="color:#15803d"></i></div>
                                        <span data-i18n="dashboard.see_reports"></span>
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="dashboard-sidebar" style="display:flex;flex-direction:column;gap:var(--sp-5)">

                        <!-- Alertas urgentes -->
                        <div class="card">
                            <div class="card-header">
                                <h3 class="card-title" data-i18n="dashboard.alerts"></h3>
                                <p class="card-subtitle" data-i18n="dashboard.alerts_sub"></p>
                            </div>
                            <div class="card-body" style="padding:0">
                                <div id="dash-alertas-lista"></div>
                            </div>
                        </div>

                        <!-- Próximos eventos -->
                        <div class="card">
                            <div class="card-header">
                                <h3 class="card-title" data-i18n="dashboard.upcoming_events"></h3>
                                <p class="card-subtitle" id="proximos-eventos-sub">—</p>
                            </div>
                            <div class="card-body" style="padding:0">
                                <div id="proximos-eventos"></div>
                            </div>
                        </div>

                    </div>
                </div>
            </section>

            <!-- ═══════════════════════════════════════════════ PRODUCTOS -->
            <section id="productos-section" class="content-section" style="display:none;">
                <div class="page-header">
                    <div class="page-header-left">
                        <div class="page-header-icon"><i data-lucide="box"></i></div>
                        <div class="page-header-title">
                            <h2 data-i18n="products.title"></h2>
                            <p class="page-subtitle" data-i18n="products.subtitle"></p>
                        </div>
                    </div>
                    <div class="page-header-actions">
                        <input type="text" id="search-productos" data-i18n-placeholder="products.search" class="form-input search-input">
                        <select id="filter-categoria" class="form-select">
                            <option value="" data-i18n="products.all_categories"></option>
                        </select>
                        <button class="btn-help" data-i18n-title="common.help" onclick="app._showSectionHelp('productos')"><i data-lucide="circle-help"></i></button>
                        <button id="btn-nuevo-producto" class="btn btn-primary" data-i18n="products.new"></button>
                    </div>
                </div>
                <div class="table-container">
                    <table class="table" id="productos-table">
                        <thead>
                            <tr>
                                <th data-i18n="products.col_code"></th>
                                <th data-i18n="products.col_name"></th>
                                <th data-i18n="products.col_category"></th>
                                <th data-i18n="products.col_stock"></th>
                                <th data-i18n="products.col_price"></th>
                                <th data-i18n="products.col_status"></th>
                                <th data-i18n="products.col_actions"></th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr><td colspan="7" class="text-center" data-i18n="products.loading"></td></tr>
                        </tbody>
                    </table>
                </div>
            </section>

            <!-- ═══════════════════════════════════════════════ CLIENTES -->
            <section id="clientes-section" class="content-section" style="display:none;">
                <div class="page-header">
                    <div class="page-header-left">
                        <div class="page-header-icon"><i data-lucide="users"></i></div>
                        <div class="page-header-title">
                            <h2 data-i18n="clients.title"></h2>
                            <p class="page-subtitle" data-i18n="clients.subtitle"></p>
                        </div>
                    </div>
                    <div class="page-header-actions">
                        <input type="text" id="search-clientes" data-i18n-placeholder="clients.search" class="form-input search-input">
                        <button class="btn-help" data-i18n-title="common.help" onclick="app._showSectionHelp('clientes')"><i data-lucide="circle-help"></i></button>
                        <button id="btn-nuevo-cliente" class="btn btn-primary" data-i18n="clients.new"></button>
                    </div>
                </div>
                <div id="clientes-grid" class="clientes-grid">
                    <p class="no-data" data-i18n="clients.loading"></p>
                </div>
            </section>

            <!-- ═══════════════════════════════════════════════ EVENTOS -->
            <section id="eventos-section" class="content-section" style="display:none;">
                <div class="page-header">
                    <div class="page-header-left">
                        <div class="page-header-icon"><i data-lucide="calendar"></i></div>
                        <div class="page-header-title">
                            <h2 data-i18n="events.title"></h2>
                            <p class="page-subtitle" data-i18n="events.subtitle"></p>
                        </div>
                    </div>
                    <div class="page-header-actions">
                        <button class="btn-help" data-i18n-title="common.help" onclick="app._showSectionHelp('eventos')"><i data-lucide="circle-help"></i></button>
                        <button id="btn-nuevo-evento" class="btn btn-primary" data-i18n="events.new"></button>
                    </div>
                </div>
                <div class="eventos-grid" id="eventos-grid">
                    <p class="no-data" data-i18n="events.loading"></p>
                </div>
            </section>

            <!-- ═══════════════════════════════════════════════ PEDIDOS -->
            <section id="pedidos-section" class="content-section" style="display:none;">
                <div class="page-header">
                    <div class="page-header-left">
                        <div class="page-header-icon"><i data-lucide="clipboard-list"></i></div>
                        <div class="page-header-title">
                            <h2 data-i18n="orders.title"></h2>
                            <p class="page-subtitle" data-i18n="orders.subtitle"></p>
                        </div>
                    </div>
                    <div class="page-header-actions">
                        <button class="btn-help" data-i18n-title="common.help" onclick="app._showSectionHelp('encargos')"><i data-lucide="circle-help"></i></button>
                        <button id="btn-nuevo-pedido-section" class="btn btn-primary" data-i18n="orders.new"></button>
                    </div>
                </div>
                <div class="pedidos-tabs">
                    <button class="pedidos-tab active" data-tab-estado="pendiente" data-i18n="orders.tab_pending">
                        <span class="pedidos-tab-count" id="tab-count-pendiente">0</span>
                    </button>
                    <button class="pedidos-tab" data-tab-estado="aprobado" data-i18n="orders.tab_approved">
                        <span class="pedidos-tab-count" id="tab-count-aprobado">0</span>
                    </button>
                    <button class="pedidos-tab" data-tab-estado="cancelado" data-i18n="orders.tab_cancelled">
                        <span class="pedidos-tab-count" id="tab-count-cancelado">0</span>
                    </button>
                </div>
                <div id="pedidos-feed" class="pedidos-feed">
                    <p class="no-data" data-i18n="orders.loading"></p>
                </div>
            </section>

            <!-- ═══════════════════════════════════════════════ INVENTARIO -->
            <section id="inventario-section" class="content-section" style="display:none;">

                <div class="inventory-tabs">
                    <button class="tab-btn active" data-tab="dashboard" data-i18n="inventory.tab_dashboard"></button>
                    <button class="tab-btn" data-tab="alertas" data-i18n="inventory.tab_alerts"></button>
                    <button class="tab-btn" data-tab="prediccion" data-i18n="inventory.tab_prediction"></button>
                    <button class="tab-btn" data-tab="proveedores" data-i18n="inventory.tab_suppliers"></button>
                    <button class="tab-btn" data-tab="ordenes" data-i18n="inventory.tab_orders"></button>
                    <button class="tab-btn" data-tab="movimientos" data-i18n="inventory.tab_movements"></button>
                </div>

                <!-- Tab Dashboard -->
                <div id="tab-dashboard" class="tab-content active">
                    <div class="inventory-kpis">
                        <div class="kpi-card">
                            <div class="kpi-icon"><i data-lucide="archive"></i></div>
                            <div class="kpi-content">
                                <h3 id="inventario-total-productos">—</h3>
                                <p data-i18n="inventory.kpi_total"></p>
                                <span class="kpi-trend" id="trend-productos">+0%</span>
                            </div>
                        </div>
                        <div class="kpi-card">
                            <div class="kpi-icon"><i data-lucide="alert-triangle"></i></div>
                            <div class="kpi-content">
                                <h3 id="inventario-stock-bajo">—</h3>
                                <p data-i18n="inventory.kpi_low_stock"></p>
                                <span class="kpi-trend negative" id="trend-stock">—</span>
                            </div>
                        </div>
                        <div class="kpi-card">
                            <div class="kpi-icon"><i data-lucide="dollar-sign"></i></div>
                            <div class="kpi-content">
                                <h3 id="inventario-valor-inventario">—</h3>
                                <p data-i18n="inventory.kpi_value"></p>
                                <span class="kpi-trend positive" id="trend-valor">+0%</span>
                            </div>
                        </div>
                        <div class="kpi-card">
                            <div class="kpi-icon"><i data-lucide="refresh-cw"></i></div>
                            <div class="kpi-content">
                                <h3 id="inventario-rotacion-promedio">—</h3>
                                <p data-i18n="inventory.kpi_rotation"></p>
                                <span class="kpi-trend" id="trend-rotacion">—</span>
                            </div>
                        </div>
                    </div>
                    <div class="inventory-charts">
                        <div class="chart-card">
                            <h3 data-i18n="inventory.rotation_analysis"></h3>
                            <div class="chart-container"><canvas id="rotation-analysis-chart"></canvas></div>
                            <div class="chart-legend">
                                <div class="legend-item">
                                    <span class="legend-color legend-green"></span>
                                    <div class="legend-text"><strong data-i18n="inventory.rotation_fast"></strong> <span data-i18n="inventory.rotation_fast_desc"></span></div>
                                </div>
                                <div class="legend-item">
                                    <span class="legend-color legend-yellow"></span>
                                    <div class="legend-text"><strong data-i18n="inventory.rotation_slow"></strong> <span data-i18n="inventory.rotation_slow_desc"></span></div>
                                </div>
                                <div class="legend-item">
                                    <span class="legend-color legend-red"></span>
                                    <div class="legend-text"><strong data-i18n="inventory.low_stock_label"></strong> <span data-i18n="inventory.low_stock_desc"></span></div>
                                </div>
                            </div>
                        </div>
                        <div class="chart-card">
                            <h3 data-i18n="inventory.no_movement"></h3>
                            <div class="ranking-list" id="productos-sin-movimiento">
                                <div class="no-data" data-i18n="inventory.loading_no_movement"></div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Tab Alertas -->
                <div id="tab-alertas" class="tab-content">
                    <div class="page-header">
                        <div class="page-header-left">
                            <div class="page-header-icon icon-red"><i data-lucide="alert-triangle"></i></div>
                            <div class="page-header-title">
                                <h2 data-i18n="inventory.alerts_title"></h2>
                                <p class="page-subtitle" data-i18n="inventory.alerts_subtitle"></p>
                            </div>
                        </div>
                        <div class="page-header-actions">
                            <button class="btn-help" data-i18n-title="common.help" onclick="app._showSectionHelp('alertas')"><i data-lucide="circle-help"></i></button>
                            <select id="filter-nivel-alerta" class="form-select">
                                <option value="" data-i18n="inventory.all_levels"></option>
                                <option value="sin_stock" data-i18n="inventory.no_stock"></option>
                                <option value="critico" data-i18n="inventory.critical"></option>
                                <option value="bajo" data-i18n="inventory.low"></option>
                            </select>
                            <button class="btn btn-primary" id="btn-generar-orden-auto" data-i18n="inventory.generate_order"></button>
                        </div>
                    </div>
                    <div class="alerts-grid" id="alertas-stock-grid">
                        <div class="no-data" data-i18n="inventory.loading"></div>
                    </div>
                </div>

                <!-- Tab Predicción -->
                <div id="tab-prediccion" class="tab-content">
                    <div class="page-header">
                        <div class="page-header-left">
                            <div class="page-header-icon"><i data-lucide="trending-up"></i></div>
                            <div class="page-header-title">
                                <h2 data-i18n="inventory.prediction_title"></h2>
                                <p class="page-subtitle" data-i18n="inventory.prediction_subtitle"></p>
                            </div>
                        </div>
                        <div class="page-header-actions">
                            <button class="btn-help" data-i18n-title="common.help" onclick="app._showSectionHelp('prediccion')"><i data-lucide="circle-help"></i></button>
                        </div>
                    </div>
                    <div class="prediction-content">
                        <div class="prediction-chart">

            <div class="modal-header-inner">
                <div class="modal-header-icon"><i data-lucide="calendar"></i></div>
                <div>
                    <h2 class="modal-title-pro" data-i18n="event_types.title"></h2>
                    <p class="modal-subtitle-pro" data-i18n="event_types.sub"></p>
                </div>
            </div>
            <button class="modal-close" onclick="app.hideModal('modal-tipos-evento')" data-i18n-aria="common.close">&times;</button>
        </div>
        <div class="modal-body">
            <div style="display:flex;gap:var(--sp-2);margin-bottom:var(--sp-2);align-items:center">
                <input type="color" id="nuevo-tipo-evento-color" value="#6b7280" style="width:36px;height:36px;border:none;border-radius:var(--r-md);cursor:pointer;padding:2px;background:none">
                <input type="text" id="nuevo-tipo-evento-nombre" class="form-input" data-i18n-placeholder="event_types.name_ph" style="flex:1">
                <button class="btn btn-primary" onclick="app.crearTipoEvento()" data-i18n="event_types.add"></button>
            </div>
            <div id="tipos-evento-lista" style="display:flex;flex-direction:column;gap:var(--sp-2);max-height:280px;overflow-y:auto;margin-top:var(--sp-3)"></div>
        </div>
        <div class="modal-footer">
            <button type="button" class="btn btn-secondary modal-close" onclick="app.hideModal('modal-tipos-evento')" data-i18n="common.close"></button>
        </div>
    </div>
</div>

<!-- ═══ MODAL TPV / VENTA RÁPIDA ═══ -->
<div id="modal-tpv" class="modal" style="display:none;">
    <div class="modal-content modal-lg">
        <div class="modal-header">
            <div class="modal-header-inner">
                <div class="modal-header-icon" style="background:linear-gradient(135deg,#16a34a,#15803d)"><i data-lucide="zap"></i></div>
                <div>
                    <h2 class="modal-title-pro" data-i18n="tpv.title"></h2>
                    <p class="modal-subtitle-pro" data-i18n="tpv.counter_subtitle"></p>
                </div>
            </div>
            <button class="modal-close" onclick="app.hideModal('modal-tpv')" data-i18n-aria="common.close">&times;</button>
        </div>
        <div class="modal-body" style="padding:0;overflow:hidden">
            <div class="tpv-layout">
                <!-- Panel izquierdo: catálogo -->
                <div class="tpv-catalog">
                    <div class="tpv-search-bar">
                        <i data-lucide="search" style="width:16px;height:16px;color:var(--s-400);flex-shrink:0"></i>
                        <input type="text" id="tpv-busqueda" class="tpv-search-input" data-i18n-placeholder="tpv.search" oninput="app.filtrarCatalogoTPV(this.value)">
                    </div>
                    <div id="tpv-catalogo" class="tpv-catalogo-grid"></div>
                </div>
                <!-- Panel derecho: ticket -->
                <div class="tpv-ticket">
                    <div class="tpv-ticket-header">
                        <span style="font-weight:700;font-size:0.95rem;color:var(--s-900)" data-i18n="tpv.ticket"></span>
                        <button class="btn btn-sm btn-ghost" onclick="app.limpiarTPV()" style="font-size:0.75rem;color:var(--s-500)" data-i18n="tpv.clear"></button>
                    </div>
                    <div id="tpv-ticket-lista" class="tpv-ticket-lista"></div>
                    <div class="tpv-totales">
                        <div class="tpv-total-row"><span data-i18n="tpv.subtotal"></span><span id="tpv-subtotal">0,00 €</span></div>
                        <div class="tpv-total-row tpv-total-main"><span data-i18n="tpv.total"></span><span id="tpv-total">0,00 €</span></div>
                    </div>
                    <div class="tpv-cliente-row">
                        <label style="font-size:0.78rem;color:var(--s-500);display:block;margin-bottom:4px" data-i18n="tpv.client_optional"></label>
                        <select id="tpv-cliente" class="form-select form-select-sm">
                            <option value="" data-i18n="tpv.client_casual"></option>
                        </select>
                    </div>
                    <div class="tpv-pago-row">
                        <label style="font-size:0.78rem;color:var(--s-500);display:block;margin-bottom:4px" data-i18n="tpv.payment"></label>
                        <div class="tpv-pago-btns">
                            <button class="tpv-pago-btn active" data-metodo="efectivo" onclick="app.seleccionarPagoTPV(this)"><i data-lucide="banknote" style="width:16px;height:16px"></i><span data-i18n="tpv.cash"></span></button>
                            <button class="tpv-pago-btn" data-metodo="tarjeta" onclick="app.seleccionarPagoTPV(this)"><i data-lucide="credit-card" style="width:16px;height:16px"></i><span data-i18n="tpv.card"></span></button>
                        </div>
                    </div>
                    <div class="tpv-cobrar-row">
                        <button type="button" id="btn-cobrar-tpv" class="tpv-cobrar-btn" onclick="app.cobrarTPV()">
                            <i data-lucide="check-circle" style="width:20px;height:20px"></i><span data-i18n="tpv.charge"></span>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- ═══════════════════════════════ ONBOARDING ═══════════════════════════════ -->
<div id="onboarding-overlay" style="display:none">
    <div class="ob-modal">
        <!-- Header -->
        <div class="ob-header">
            <div class="ob-logo"><i data-lucide="flower-2"></i></div>
            <h1 class="ob-title" data-i18n="ob.welcome"></h1>
            <p class="ob-subtitle" data-i18n="ob.welcome_sub"></p>
        </div>

        <!-- Dots -->
        <div class="ob-dots">
            <span class="ob-dot active" data-dot="1"></span>
            <span class="ob-dot" data-dot="2"></span>
            <span class="ob-dot" data-dot="3"></span>
        </div>

        <!-- Step 1: Language & Currency -->
        <div class="ob-step active" data-step="1">
            <h2 class="ob-step-title" data-i18n="ob.step1_title"></h2>
            <p class="ob-step-desc" data-i18n="ob.step1_desc"></p>

            <div class="ob-field">
                <label data-i18n="ob.lang_label"></label>
                <div class="ob-options">
                    <label class="ob-option">
                        <input type="radio" name="ob-lang" value="es" checked>
                        <span class="ob-option-card">
                            <span class="ob-option-flag">🇪🇸</span>
                            <span class="ob-option-name">Español</span>
                        </span>
                    </label>
                    <label class="ob-option">
                        <input type="radio" name="ob-lang" value="en">
                        <span class="ob-option-card">
                            <span class="ob-option-flag">🇬🇧</span>
                            <span class="ob-option-name">English</span>
                        </span>
                    </label>
                </div>
            </div>

            <div class="ob-field">
                <label data-i18n="ob.currency_label"></label>
                <div class="ob-options">
                    <label class="ob-option">
                        <input type="radio" name="ob-currency" value="EUR" checked>
                        <span class="ob-option-card">
                            <span class="ob-option-flag">€</span>
                            <span class="ob-option-name">Euro</span>
                        </span>
                    </label>
                    <label class="ob-option">
                        <input type="radio" name="ob-currency" value="USD">
                        <span class="ob-option-card">
                            <span class="ob-option-flag">$</span>
                            <span class="ob-option-name">Dollar</span>
                        </span>
                    </label>
                    <label class="ob-option">
                        <input type="radio" name="ob-currency" value="GBP">
                        <span class="ob-option-card">
                            <span class="ob-option-flag">£</span>
                            <span class="ob-option-name">Pound</span>
                        </span>
                    </label>
                    <label class="ob-option">
                        <input type="radio" name="ob-currency" value="MXN">
                        <span class="ob-option-card">
                            <span class="ob-option-flag">$</span>
                            <span class="ob-option-name">Peso MX</span>
                        </span>
                    </label>
                </div>
            </div>
        </div>

        <!-- Step 2: Company data -->
        <div class="ob-step" data-step="2">
            <h2 class="ob-step-title" data-i18n="ob.step2_title"></h2>
            <p class="ob-step-desc" data-i18n="ob.step2_desc"></p>

            <div class="ob-form">
                <div class="ob-field">
                    <label data-i18n="ob.company_name_label"></label>
                    <input type="text" id="ob-company-name" data-i18n-placeholder="ob.company_name_ph">
                </div>
                <div class="ob-field">
                    <label data-i18n="ob.address_label"></label>
                    <input type="text" id="ob-address" data-i18n-placeholder="ob.address_ph">
                </div>
                <div class="ob-field-row">
                    <div class="ob-field">
                        <label data-i18n="ob.phone_label"></label>
                        <input type="text" id="ob-phone" data-i18n-placeholder="ob.phone_ph">
                    </div>
                    <div class="ob-field">
                        <label data-i18n="ob.email_label"></label>
                        <input type="email" id="ob-email" data-i18n-placeholder="ob.email_ph">
                    </div>
                </div>
            </div>
        </div>

        <!-- Step 3: Finish -->
        <div class="ob-step" data-step="3">
            <h2 class="ob-step-title" data-i18n="ob.step3_title"></h2>
            <p class="ob-step-desc" data-i18n="ob.step3_desc"></p>

            <div class="ob-features">
                <div class="ob-feat"><i data-lucide="package"></i><span data-i18n="ob.feat1"></span></div>
                <div class="ob-feat"><i data-lucide="users"></i><span data-i18n="ob.feat2"></span></div>
                <div class="ob-feat"><i data-lucide="warehouse"></i><span data-i18n="ob.feat3"></span></div>
                <div class="ob-feat"><i data-lucide="bar-chart-2"></i><span data-i18n="ob.feat4"></span></div>
            </div>

            <div class="ob-sample-notice">
                <div class="ob-sample-icon"><i data-lucide="lightbulb"></i></div>
                <div>
                    <strong data-i18n="ob.sample_title"></strong>
                    <p data-i18n="ob.sample_desc"></p>
                </div>
            </div>
        </div>

        <!-- Footer buttons -->
        <div class="ob-footer">
            <button id="ob-btn-back" class="ob-btn ob-btn-secondary" onclick="app.onboardingPrev()" style="display:none" data-i18n="ob.back"></button>
            <button id="ob-btn-next" class="ob-btn ob-btn-primary" onclick="app.onboardingNext()" data-i18n="ob.next"></button>
            <button id="ob-btn-finish" class="ob-btn ob-btn-primary ob-btn-finish" onclick="app.onboardingFinish()" style="display:none" data-i18n="ob.start"></button>
        </div>
    </div>
</div>

<style>
#onboarding-overlay {
    position: fixed; inset: 0; z-index: 9999;
    background: rgba(15,15,20,.82);
    backdrop-filter: blur(6px);
    display: flex; align-items: center; justify-content: center;
    animation: ob-fade-in .25s ease;
}
@keyframes ob-fade-in { from { opacity:0 } to { opacity:1 } }
@keyframes ob-fade-out { from { opacity:1 } to { opacity:0 } }

.ob-modal {
    background: var(--bg-card, #1e1e2e);
    border: 1px solid var(--border-color, rgba(255,255,255,.1));
    border-radius: 20px;
    padding: 36px 40px 32px;
    width: 520px; max-width: calc(100vw - 32px);
    box-shadow: 0 24px 64px rgba(0,0,0,.5);
    display: flex; flex-direction: column; gap: 24px;
}

.ob-header { display: flex; flex-direction: column; align-items: center; text-align: center; }
.ob-logo { margin-bottom: 12px; color: var(--accent-color, #c084fc); }
.ob-logo i[data-lucide] { width: 52px; height: 52px; display: block; }
.ob-title { font-size: 1.6rem; font-weight: 700; color: var(--text-primary, #f0f0f0); margin: 0 0 6px; }
.ob-subtitle { font-size: .95rem; color: var(--text-secondary, #999); margin: 0; }

.ob-dots { display: flex; justify-content: center; gap: 8px; }
.ob-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--border-color, rgba(255,255,255,.2));
    transition: background .2s, transform .2s;
}
.ob-dot.active { background: var(--accent-color, #c084fc); transform: scale(1.3); }

.ob-step { display: none; flex-direction: column; gap: 20px; }
.ob-step.active { display: flex; }
.ob-step-title { font-size: 1.15rem; font-weight: 600; color: var(--text-primary, #f0f0f0); margin: 0; }
.ob-step-desc { font-size: .88rem; color: var(--text-secondary, #999); margin: 0; }

.ob-field { display: flex; flex-direction: column; gap: 8px; }
.ob-field label { font-size: .85rem; font-weight: 500; color: var(--text-secondary, #bbb); }
.ob-field input {
    background: var(--bg-input, rgba(255,255,255,.07));
    border: 1px solid var(--border-color, rgba(255,255,255,.12));
    border-radius: 10px; padding: 10px 14px;
    color: var(--text-primary, #f0f0f0); font-size: .9rem;
    outline: none; transition: border-color .2s;
}
.ob-field input:focus { border-color: var(--accent-color, #c084fc); }
.ob-field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.ob-form { display: flex; flex-direction: column; gap: 16px; }

.ob-options { display: flex; flex-wrap: wrap; gap: 10px; }
.ob-option { cursor: pointer; }
.ob-option input { display: none; }
.ob-option-card {
    display: flex; flex-direction: column; align-items: center; gap: 4px;
    padding: 10px 18px; border-radius: 10px;
    border: 2px solid var(--border-color, rgba(255,255,255,.12));
    background: var(--bg-input, rgba(255,255,255,.05));
    transition: border-color .15s, background .15s;
    cursor: pointer;
}
.ob-option input:checked + .ob-option-card {
    border-color: var(--accent-color, #c084fc);
    background: rgba(192,132,252,.12);
}
.ob-option-flag { font-size: 1.4rem; line-height: 1; }
.ob-option-name { font-size: .78rem; color: var(--text-secondary, #bbb); }

.ob-features { display: flex; flex-direction: column; gap: 10px; }
.ob-feat {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 14px; border-radius: 10px;
    background: var(--bg-input, rgba(255,255,255,.05));
    font-size: .9rem; color: var(--text-primary, #f0f0f0);
}
.ob-feat > i[data-lucide] { width: 18px; height: 18px; flex-shrink: 0; color: var(--accent-color, #c084fc); }

.ob-sample-notice {
    display: flex; gap: 14px; align-items: flex-start;
    padding: 14px 16px; border-radius: 12px;
    background: rgba(192,132,252,.1);
    border: 1px solid rgba(192,132,252,.25);
}
.ob-sample-icon { flex-shrink: 0; color: var(--accent-color, #c084fc); }
.ob-sample-icon i[data-lucide] { width: 20px; height: 20px; }
.ob-sample-notice strong { font-size: .9rem; color: var(--text-primary, #f0f0f0); display: block; margin-bottom: 4px; }
.ob-sample-notice p { font-size: .82rem; color: var(--text-secondary, #aaa); margin: 0; }

.ob-footer { display: flex; justify-content: flex-end; gap: 10px; padding-top: 4px; }
.ob-btn {
    padding: 10px 24px; border-radius: 10px; border: none;
    font-size: .9rem; font-weight: 600; cursor: pointer; transition: opacity .15s, transform .1s;
}
.ob-btn:hover { opacity: .88; transform: translateY(-1px); }
.ob-btn-secondary {
    background: var(--bg-input, rgba(255,255,255,.08));
    color: var(--text-secondary, #bbb);
}
.ob-btn-primary {
    background: var(--accent-color, #c084fc);
    color: #fff;
}
.ob-btn-finish {
    background: linear-gradient(135deg, #c084fc, #818cf8);
    min-width: 120px;
}
</style>

<script src="../i18n.js"></script>
<script src="../js/main.js"></script>
<script>
    // Initialize Lucide icons after DOM and JS app are ready
    document.addEventListener('DOMContentLoaded', () => {
        if (typeof lucide !== 'undefined') lucide.createIcons();
    });
</script>
</body>
</html>
